# Homie AI Configuration — Pure HuggingFace (no Ollama)
# This machine: MS (RTX 5080, mesh Hub)
# Server: msg-1 (100.116.35.40 via Tailscale)

llm:
  backend: hf_local
  model_path: ~/.homie/hf_model/merged
  context_length: 8192
  temperature: 0.7
  max_tokens: 2048
  gpu_layers: -1

voice:
  enabled: false
  hotkey: ctrl+8
  wake_word: hey homie

storage:
  path: ~/.homie
  db_name: homie.db

inference:
  priority:
    - local
    - lan
    - qubrid
  qubrid:
    enabled: true
    model: Qwen/Qwen3.5-Flash
    base_url: https://platform.qubrid.com/v1
    timeout: 30

mesh:
  enabled: true
  auto_discover: true
  auto_elect_hub: true
  preferred_role: hub

user:
  name: Muthu
  language: en
  timezone: Asia/Kolkata

privacy:
  data_retention_days: 90
  screen_reader_consent: false

notifications:
  enabled: true

awareness:
  enabled: true
  poll_interval_seconds: 5.0

proactive:
  enabled: true

model_evolution:
  enabled: true
  ollama_registry_name: Muthu88/Homie
  ollama_base_model: LiquidAI/LFM2.5-1.2B-Instruct

finetune:
  enabled: true
  base_model: LiquidAI/LFM2.5-1.2B-Instruct
  registry_name: Muthu88/Homie
